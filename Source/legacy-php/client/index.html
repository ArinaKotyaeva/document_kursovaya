<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Документ — реестр учётных данных</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header class="page-header">
      <h1>Реестр персональных данных (Документ учёта)</h1>
      <p class="subtitle">Электронный реестр учётных карточек пользователей</p>
    </header>

    <section class="panel role-panel">
      <h2>Роль клиента</h2>
      <div class="role-switcher" role="radiogroup" aria-label="Выбор роли">
        <label class="role-option">
          <input type="radio" name="role" value="admin" checked>
          <span>Admin</span>
        </label>
        <label class="role-option">
          <input type="radio" name="role" value="guest">
          <span>Guest</span>
        </label>
      </div>
    </section>

    <section class="panel form-panel" id="admin-form-panel">
      <h2>Добавить учётную карточку</h2>
      <form id="user-form" novalidate>
        <div class="form-grid">
          <label>
            Name
            <input type="text" id="name" name="name" placeholder="Иван Иванов" required>
          </label>
          <label>
            Email
            <input type="email" id="email" name="email" placeholder="ivan@example.com" required>
          </label>
          <label>
            Age
            <input type="number" id="age" name="age" min="1" placeholder="Необязательно">
          </label>
        </div>
        <button type="submit" id="add-btn" class="btn btn-primary">Добавить пользователя</button>
      </form>
    </section>

    <section class="panel table-panel">
      <div class="table-header">
        <h2>Реестр записей</h2>
        <button type="button" id="export-btn" class="btn btn-secondary">Скачать отчёт</button>
      </div>
      <div id="error-message" class="error-message" aria-live="polite"></div>
      <div id="info-message" class="info-message" aria-live="polite"></div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Имя</th>
              <th>Email</th>
              <th>Возраст</th>
              <th id="actions-header">Действия</th>
            </tr>
          </thead>
          <tbody id="users-table-body">
            <tr>
              <td colspan="5" class="empty-row">Загрузка данных...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
